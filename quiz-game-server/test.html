<!DOCTYPE html>
<html>
<body>
<button onclick="connect()">Connect</button>

<script>
let ws;

function connect() {
  ws = new WebSocket("ws://localhost:8081/ws");

  ws.onopen = () => {
    console.log("Connected");
    ws.send(JSON.stringify({msg: "hello"}));
  };

  ws.onmessage = (e) => {
    console.log("Server:", e.data);
  };
}
</script>
</body>
</html>
